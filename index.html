<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>首頁｜OMNIPLAY New Support</title>
  <style>
    :root{--bg:#f4f7fb;--panel:#fff;--brand:#2563eb;--brand2:#1e40af;--text:#172033;--muted:#64748b;--line:#e2e8f0;--danger:#dc2626;--ok:#16a34a;--warn:#d97706;--shadow:0 12px 30px rgba(15,23,42,.08)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",Arial,sans-serif}.hidden{display:none!important}.app-shell{display:flex;min-height:100vh}.sidebar{width:270px;background:#0f172a;color:#e5e7eb;padding:18px 14px;position:fixed;inset:0 auto 0 0;overflow:auto}.brand{display:flex;align-items:center;gap:10px;padding:8px 10px 20px}.logo{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#60a5fa,#1d4ed8);display:grid;place-items:center;font-weight:800}.brand h1{font-size:17px;margin:0}.nav a{display:flex;align-items:center;gap:10px;color:#cbd5e1;text-decoration:none;padding:11px 12px;border-radius:12px;margin:4px 0}.nav a.active,.nav a:hover{background:#1e293b;color:white}.main{margin-left:270px;flex:1;min-width:0}.topbar{height:64px;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:5}.content{padding:24px}.page-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px}.page-title h2{margin:0;font-size:28px}.page-title p{margin:6px 0 0;color:var(--muted)}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);padding:18px}.grid{display:grid;gap:16px}.stats{grid-template-columns:repeat(4,minmax(0,1fr))}.stat strong{display:block;font-size:30px;margin-top:8px}.quick{grid-template-columns:repeat(3,minmax(0,1fr))}.quick a{display:block;text-decoration:none;color:var(--text);padding:16px;border:1px solid var(--line);border-radius:16px;background:#fff}.toolbar{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}.btn{border:0;border-radius:12px;padding:10px 14px;background:var(--brand);color:#fff;cursor:pointer;font-weight:700}.btn.secondary{background:#e2e8f0;color:#0f172a}.btn.danger{background:var(--danger)}.btn.ghost{background:transparent;color:var(--brand);border:1px solid #bfdbfe}.input,select,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px;background:white;font:inherit}textarea{min-height:100px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px}table{width:100%;border-collapse:collapse;background:white}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{background:#f8fafc;color:#334155;font-size:13px}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:4px 9px;font-size:12px;background:#e0f2fe;color:#0369a1}.badge.ok{background:#dcfce7;color:#166534}.badge.warn{background:#fef3c7;color:#92400e}.badge.danger{background:#fee2e2;color:#991b1b}.auth{min-height:100vh;display:grid;place-items:center;padding:24px}.auth-box{width:min(440px,100%)}.form-grid{display:grid;gap:12px}.schema-grid{display:grid;gap:12px}.field{min-width:0}.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.55);display:grid;place-items:center;z-index:20;padding:18px}.modal{width:min(980px,100%);max-height:90vh;overflow:auto;background:white;border-radius:20px;box-shadow:var(--shadow)}.modal header,.modal footer{padding:16px 18px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}.modal footer{border-top:1px solid var(--line);border-bottom:0}.modal .body{padding:18px}.toast{position:fixed;right:18px;bottom:18px;background:#0f172a;color:white;border-radius:14px;padding:12px 14px;z-index:30}.mobile-toggle{display:none}.subtable-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-bottom:8px}.designer-row{display:grid;grid-template-columns:repeat(6,1fr) 80px;gap:8px;align-items:end;border-bottom:1px solid var(--line);padding:10px 0}@media(max-width:900px){.sidebar{transform:translateX(-105%);transition:.2s;z-index:15}.sidebar.open{transform:none}.main{margin-left:0}.mobile-toggle{display:inline-flex}.stats,.quick{grid-template-columns:1fr}.page-head{flex-direction:column}.designer-row{grid-template-columns:1fr 1fr}.topbar{padding:0 12px}.content{padding:14px}}
  </style>
</head>
<body>
<div id="auth" class="auth"><div class="auth-box card"><div class="brand"><div class="logo">OP</div><h1>OMNIPLAY New Support</h1></div><h2 id="authTitle">客服系統登入</h2><p id="authHint" class="muted">請登入以進入主控台</p><div id="loginForm" class="form-grid"><input id="loginAccount" class="input" placeholder="帳號"><input id="loginPassword" class="input" type="password" placeholder="密碼"><button class="btn" onclick="login()">登入</button></div><div id="firstAdminForm" class="form-grid hidden"><input id="adminCode" class="input" placeholder="人員編號"><input id="adminName" class="input" placeholder="姓名"><input id="adminAccount" class="input" placeholder="帳號"><input id="adminPassword" class="input" type="password" placeholder="密碼"><button class="btn" onclick="createFirstAdmin()">建立第一個帳號</button></div><p id="firebaseState"><span class="badge warn">檢查 Firebase...</span></p></div></div>
<div id="app" class="app-shell hidden"><aside id="sidebar" class="sidebar"><div class="brand"><div class="logo">OP</div><h1>New CSR Support</h1></div><nav id="nav" class="nav"></nav></aside><main class="main"><div class="topbar"><button class="btn secondary mobile-toggle" onclick="toggleMenu()">☰</button><strong id="topTitle">首頁</strong><div><span id="currentUser"></span> <button class="btn secondary" onclick="logout()">登出</button></div></div><section id="content" class="content"></section></main></div>
<div id="modalRoot"></div><div id="toast" class="toast hidden"></div>
<script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"REPLACE_WITH_NEW_FIREBASE_API_KEY",authDomain:"REPLACE_WITH_NEW_PROJECT.firebaseapp.com",projectId:"REPLACE_WITH_NEW_PROJECT",storageBucket:"REPLACE_WITH_NEW_PROJECT.appspot.com",messagingSenderId:"REPLACE",appId:"REPLACE"};
const SYSTEM_NAMESPACE='newSupport';
const COLLECTIONS={staff:`${SYSTEM_NAMESPACE}_staff`,leaves:`${SYSTEM_NAMESPACE}_leaves`,schedules:`${SYSTEM_NAMESPACE}_schedules`,meetings:`${SYSTEM_NAMESPACE}_meetings`,logs:`${SYSTEM_NAMESPACE}_logs`,prodAlerts:`${SYSTEM_NAMESPACE}_prodAlerts`,knowledgeBase:`${SYSTEM_NAMESPACE}_knowledgeBase`,aiDatabase:`${SYSTEM_NAMESPACE}_aiDatabase`,formSchemas:`${SYSTEM_NAMESPACE}_formSchemas`,settings:`${SYSTEM_NAMESPACE}_settings`};
const modules={home:{label:'首頁',icon:'🏠'},staff:{label:'人員管理',icon:'👥',collection:COLLECTIONS.staff},leaves:{label:'休假表',icon:'🌴',collection:COLLECTIONS.leaves},schedules:{label:'排程表',icon:'📅',collection:COLLECTIONS.schedules},meetings:{label:'會議記錄',icon:'📝',collection:COLLECTIONS.meetings,designer:true},logs:{label:'日誌',icon:'📘',collection:COLLECTIONS.logs,designer:true},prodAlerts:{label:'PROD 告警紀錄',icon:'🚨',collection:COLLECTIONS.prodAlerts,designer:true},knowledgeBase:{label:'知識庫',icon:'📚',collection:COLLECTIONS.knowledgeBase,designer:true},aiDatabase:{label:'AI 資料庫',icon:'🤖',collection:COLLECTIONS.aiDatabase,designer:true}};
const defaultSchemas={staff:{cols:2,rows:4,fields:[f('code','人員編號','text',true),f('name','姓名','text',true),f('account','帳號','text',true),f('password','密碼','password',true,false,false),f('role','權限','select',true,true,true,'staff','admin,manager,staff'),f('department','部門/班別','text'),f('active','啟用狀態','select',true,true,true,'啟用','啟用,停用')]},leaves:{cols:2,rows:3,fields:[f('person','人員','person',true),f('date','日期','date',true),f('type','休假類型','select',true,true,true,'特休','特休,病假,事假,公假'),f('note','備註','textarea')]},schedules:{cols:3,rows:3,fields:[f('date','日期','date',true),f('shift','班別','select',true,true,true,'早班','早班,晚班'),f('person','人員','person',true),f('task','工作內容','text')]},meetings:{cols:2,rows:4,fields:[f('title','會議主題','text',true),f('meetingTime','會議時間','datetime-local',true),f('participants','參與人員','person'),f('content','會議內容','textarea',true),f('attachments','附件','file'),f('images','圖片','image')]},logs:{cols:2,rows:4,fields:[f('title','日誌標題','text',true),f('logTime','日誌時間','datetime-local',true),f('owner','人員','person'),f('content','內容','textarea',true),f('items','子表格','subtable'),f('images','圖片','image')]},prodAlerts:{cols:2,rows:4,fields:[f('title','告警標題','text',true),f('level','告警等級','select',true,true,true,'P2','P1,P2,P3'),f('alertTime','告警時間','datetime-local',true),f('status','處理狀態','select',true,true,true,'處理中','待處理,處理中,已解決'),f('handler','處理人員','person'),f('attachments','附件','file')]},knowledgeBase:{cols:2,rows:4,fields:[f('title','標題','text',true),f('category','分類','text'),f('keywords','關鍵字','text'),f('content','內容','textarea',true),f('images','圖片','image'),f('attachments','附件','file')]},aiDatabase:{cols:2,rows:4,fields:[f('question','問題/Prompt','textarea',true),f('answer','答案/回覆','textarea',true),f('tags','標籤','text'),f('source','來源','text')]}};
function f(key,label,type='text',required=false,list=true,detail=true,def='',options=''){return{key,label,type,required,default:def,placeholder:label,options,show:true,list,detail,order:99,col:1,row:1,colSpan:1,rowSpan:1,width:'',height:'',subtable:false}}
let db=null,currentUser=null,schemas={},cache={};
try{firebase.initializeApp(firebaseConfig);db=firebase.firestore();document.getElementById('firebaseState').innerHTML='<span class="badge ok">● 已連線 Firebase</span>'}catch(e){document.getElementById('firebaseState').innerHTML='<span class="badge danger">Firebase 設定待替換，暫用本機模式</span>'}
const local={get:c=>JSON.parse(localStorage.getItem(c)||'[]'),set:(c,v)=>localStorage.setItem(c,JSON.stringify(v))};
async function getAll(c){if(db){const s=await db.collection(c).get();return s.docs.map(d=>({id:d.id,...d.data()}))}return local.get(c)}
async function saveDoc(c,data,id){data.updatedAt=new Date().toISOString();if(db){if(id){await db.collection(c).doc(id).set(data,{merge:true});return id}return (await db.collection(c).add({...data,createdAt:new Date().toISOString()})).id}let a=local.get(c);if(id){a=a.map(x=>x.id===id?{...x,...data}:x)}else{a.push({id:crypto.randomUUID(),...data,createdAt:new Date().toISOString()})}local.set(c,a)}
async function delDoc(c,id){if(db)return db.collection(c).doc(id).delete();local.set(c,local.get(c).filter(x=>x.id!==id))}
async function loadSchemas(){schemas=structuredClone(defaultSchemas);const rows=await getAll(COLLECTIONS.formSchemas);rows.forEach(r=>{if(r.module&&r.schema)schemas[r.module]=r.schema})}
async function saveSchema(module){await saveDoc(COLLECTIONS.formSchemas,{module,schema:schemas[module]},module);toast('設計設定已儲存')}
async function init(){await loadSchemas();cache.staff=await getAll(COLLECTIONS.staff);if(!cache.staff.length){showFirstAdmin()}else showLogin()}
function showFirstAdmin(){authTitle.textContent='建立管理員帳號';authHint.textContent=`首次設定：${COLLECTIONS.staff} 尚無資料，請建立第一個管理員帳號。`;loginForm.classList.add('hidden');firstAdminForm.classList.remove('hidden')}
function showLogin(){loginForm.classList.remove('hidden');firstAdminForm.classList.add('hidden')}
async function createFirstAdmin(){await saveDoc(COLLECTIONS.staff,{code:adminCode.value,name:adminName.value,account:adminAccount.value,password:adminPassword.value,role:'admin',active:'啟用'});toast('管理員已建立');init()}
async function login(){cache.staff=await getAll(COLLECTIONS.staff);const u=cache.staff.find(x=>x.account===loginAccount.value&&x.password===loginPassword.value&&x.active!=='停用');if(!u)return toast('登入失敗或帳號停用');currentUser=u;auth.classList.add('hidden');app.classList.remove('hidden');renderNav();route(location.hash.slice(1)||'home')}
function logout(){currentUser=null;app.classList.add('hidden');auth.classList.remove('hidden')}function canEdit(){return currentUser&&['admin','manager'].includes(currentUser.role)}function toggleMenu(){sidebar.classList.toggle('open')}
function renderNav(){nav.innerHTML=Object.entries(modules).map(([k,m])=>`<a href="#${k}" data-route="${k}">${m.icon}<span>${m.label}</span></a>`).join('')}
window.onhashchange=()=>route(location.hash.slice(1)||'home');async function route(name){if(!modules[name])name='home';document.querySelectorAll('.nav a').forEach(a=>a.classList.toggle('active',a.dataset.route===name));topTitle.textContent=modules[name].label;currentUser.textContent=currentUser?`${currentUser.name}｜${currentUser.role}`:'';sidebar.classList.remove('open');if(name==='home')return renderHome();renderModule(name)}
async function renderHome(){for(const k of Object.keys(modules).filter(k=>modules[k].collection))cache[k]=await getAll(modules[k].collection);content.innerHTML=`<div class="page-head"><div class="page-title"><h2>首頁</h2><p>快速查看新客服支援系統入口，所有統計皆讀取 ${SYSTEM_NAMESPACE} namespace。</p></div><span class="badge ok">● 已連線 Firebase / 本機備援</span></div><div class="grid stats">${['staff','leaves','schedules','logs'].map(k=>`<div class="card stat"><span>${modules[k].label}</span><strong>${cache[k].length}</strong></div>`).join('')}</div><div class="card" style="margin-top:16px"><h3>今日事項</h3><div id="todayItems">${todayItems()}</div></div><div class="grid quick" style="margin-top:16px">${Object.entries(modules).filter(([k])=>k!=='home').map(([k,m])=>`<a href="#${k}"><b>${m.icon} ${m.label}</b><p>新增、查看、搜尋與管理</p></a>`).join('')}</div>`}
function todayItems(){const d=new Date().toISOString().slice(0,10), rows=[...(cache.schedules||[]),...(cache.leaves||[]),...(cache.logs||[])].filter(x=>(x.date||x.logTime||'').startsWith(d));return rows.length?'<ul>'+rows.map(x=>`<li>${x.title||x.person||x.shift||'事項'} <span class="badge">${x.date||x.logTime||''}</span></li>`).join('')+'</ul>':'<p>目前沒有今日事項。</p>'}
async function renderModule(name){const m=modules[name], schema=schemas[name];cache[name]=await getAll(m.collection);const fields=schema.fields.filter(x=>x.show&&x.list).sort((a,b)=>a.order-b.order);content.innerHTML=`<div class="page-head"><div class="page-title"><h2>${m.label}</h2><p>Collection：${m.collection}</p></div><div>${m.designer?`<button class="btn ghost" onclick="openDesigner('${name}')">設計表單／表格</button> `:''}<button class="btn" onclick="openEditor('${name}')">新增</button></div></div><div class="toolbar"><input id="search" class="input" style="max-width:360px" placeholder="搜尋..." oninput="drawRows('${name}')"><button class="btn secondary" onclick="drawRows('${name}')">搜尋</button></div><div class="table-wrap"><table><thead><tr>${fields.map(x=>`<th>${x.label}</th>`).join('')}<th>操作</th></tr></thead><tbody id="rows"></tbody></table></div>`;drawRows(name)}
function drawRows(name){const q=(document.getElementById('search')?.value||'').toLowerCase(), fields=schemas[name].fields.filter(x=>x.show&&x.list).sort((a,b)=>a.order-b.order);let rows=(cache[name]||[]).filter(r=>JSON.stringify(r).toLowerCase().includes(q));document.getElementById('rows').innerHTML=rows.map(r=>`<tr>${fields.map(f=>`<td>${format(r[f.key],f)}</td>`).join('')}<td><button class="btn secondary" onclick="openView('${name}','${r.id}')">查看</button> <button class="btn" onclick="openEditor('${name}','${r.id}')">編輯</button> <button class="btn danger" onclick="removeRow('${name}','${r.id}')">刪除</button></td></tr>`).join('')||`<tr><td colspan="${fields.length+1}">無資料</td></tr>`}
function format(v,f){if(!v)return '';if(Array.isArray(v))return v.map(x=>typeof x==='object'?Object.values(x).join(' / '):x).join('<br>');if(String(v).startsWith('data:image'))return '<img src="'+v+'" style="max-width:90px;border-radius:8px">';return String(v)}
function formHtml(name,row={}){const s=schemas[name];return `<div class="schema-grid" style="grid-template-columns:repeat(${s.cols},minmax(0,1fr))">${s.fields.filter(x=>x.show).sort((a,b)=>a.order-b.order).map(f=>`<label class="field" style="grid-column:span ${f.colSpan||1};grid-row:span ${f.rowSpan||1};width:${f.width||'auto'};min-height:${f.height||'auto'}"><b>${f.label}${f.required?' *':''}</b>${inputHtml(f,row[f.key]??f.default)}</label>`).join('')}</div>`}
function inputHtml(f,v=''){if(f.type==='textarea')return `<textarea data-key="${f.key}" placeholder="${f.placeholder||''}">${v||''}</textarea>`;if(f.type==='select'||f.type==='person')return `<select data-key="${f.key}">${(f.type==='person'?(cache.staff||[]).map(x=>x.name).join(','):f.options).split(',').filter(Boolean).map(o=>`<option ${o===v?'selected':''}>${o}</option>`).join('')}</select>`;if(f.type==='subtable')return `<div data-key="${f.key}" data-subtable>${(v||[]).map(r=>subRow(r)).join('')}<button type="button" class="btn secondary" onclick="this.insertAdjacentHTML('beforebegin',subRow())">新增子列</button></div>`;return `<input data-key="${f.key}" class="input" type="${['date','datetime-local','number','password'].includes(f.type)?f.type:'text'}" placeholder="${f.placeholder||''}" value="${v||''}">`}
function subRow(r={item:'',value:''}){return `<div class="subtable-row"><input class="input" placeholder="項目" value="${r.item||''}"><input class="input" placeholder="內容" value="${r.value||''}"><button class="btn danger" onclick="this.parentElement.remove()">刪除</button></div>`}
function collect(modal){const data={};modal.querySelectorAll('[data-key]').forEach(el=>{const k=el.dataset.key;if(el.dataset.subtable!==undefined){data[k]=[...el.querySelectorAll('.subtable-row')].map(r=>({item:r.children[0].value,value:r.children[1].value}))}else data[k]=el.value});return data}
function openEditor(name,id){const row=(cache[name]||[]).find(x=>x.id===id)||{};openModal(`${id?'編輯':'新增'}${modules[name].label}`,formHtml(name,row),async modal=>{try{await saveDoc(modules[name].collection,collect(modal),id);toast('已儲存');closeModal();renderModule(name)}catch(e){toast('Firebase 寫入失敗：'+e.message)}})}
function openView(name,id){const row=(cache[name]||[]).find(x=>x.id===id)||{}, fs=schemas[name].fields.filter(f=>f.detail!==false).sort((a,b)=>a.order-b.order);openModal(`${modules[name].label}詳細檢視`,fs.map(f=>`<p><b>${f.label}</b><br>${format(row[f.key],f)||'—'}</p>`).join(''),null)}
async function removeRow(name,id){if(confirm('確定刪除？')){await delDoc(modules[name].collection,id);toast('已刪除');renderModule(name)}}
function openDesigner(name){const rows=schemas[name].fields.sort((a,b)=>a.order-b.order).map((f,i)=>designerRow(f,i)).join('');openModal(`設計表單／表格：${modules[name].label}`,`<div class="toolbar"><label>表單欄數<input id="schemaCols" class="input" type="number" value="${schemas[name].cols}"></label><label>表單列數<input id="schemaRows" class="input" type="number" value="${schemas[name].rows}"></label><button class="btn secondary" onclick="addDesignerField()">新增欄位</button></div><div id="designerRows">${rows}</div>`,async modal=>{schemas[name].cols=+schemaCols.value||2;schemas[name].rows=+schemaRows.value||4;schemas[name].fields=[...modal.querySelectorAll('.designer-row')].map((r,i)=>({key:r.querySelector('[data-k=key]').value,label:r.querySelector('[data-k=label]').value,type:r.querySelector('[data-k=type]').value,required:r.querySelector('[data-k=required]').checked,show:r.querySelector('[data-k=show]').checked,list:r.querySelector('[data-k=list]').checked,detail:r.querySelector('[data-k=detail]').checked,options:r.querySelector('[data-k=options]').value,default:r.querySelector('[data-k=default]').value,placeholder:r.querySelector('[data-k=placeholder]').value,order:+r.querySelector('[data-k=order]').value||i,colSpan:+r.querySelector('[data-k=colSpan]').value||1,rowSpan:+r.querySelector('[data-k=rowSpan]').value||1,width:r.querySelector('[data-k=width]').value,height:r.querySelector('[data-k=height]').value}));await saveSchema(name);closeModal();renderModule(name)})}
function designerRow(f={},i=0){return `<div class="designer-row"><input data-k="key" class="input" placeholder="key" value="${f.key||'field'+Date.now()}"><input data-k="label" class="input" placeholder="標題" value="${f.label||''}"><select data-k="type">${['text','textarea','number','date','datetime-local','select','person','radio','checkbox','image','file','subtable','password'].map(t=>`<option ${t===(f.type||'text')?'selected':''}>${t}</option>`).join('')}</select><input data-k="options" class="input" placeholder="選項" value="${f.options||''}"><input data-k="default" class="input" placeholder="預設值" value="${f.default||''}"><input data-k="placeholder" class="input" placeholder="Placeholder" value="${f.placeholder||''}"><div><label><input data-k="required" type="checkbox" ${f.required?'checked':''}>必填</label><br><label><input data-k="show" type="checkbox" ${f.show!==false?'checked':''}>顯示</label><br><label><input data-k="list" type="checkbox" ${f.list!==false?'checked':''}>列表</label><br><label><input data-k="detail" type="checkbox" ${f.detail!==false?'checked':''}>詳細</label></div><input data-k="order" class="input" type="number" placeholder="排序" value="${f.order??i}"><input data-k="colSpan" class="input" type="number" placeholder="跨欄" value="${f.colSpan||1}"><input data-k="rowSpan" class="input" type="number" placeholder="跨列" value="${f.rowSpan||1}"><input data-k="width" class="input" placeholder="寬度" value="${f.width||''}"><input data-k="height" class="input" placeholder="高度" value="${f.height||''}"><button class="btn danger" onclick="this.parentElement.remove()">刪除</button></div>`}
function addDesignerField(){designerRows.insertAdjacentHTML('beforeend',designerRow({order:designerRows.children.length},designerRows.children.length))}
function openModal(title,body,onSave){modalRoot.innerHTML=`<div class="modal-backdrop"><div class="modal"><header><h3>${title}</h3><button class="btn secondary" onclick="closeModal()">關閉</button></header><div class="body">${body}</div><footer>${onSave?'<button id="saveModal" class="btn">儲存</button>':''}</footer></div></div>`;if(onSave)saveModal.onclick=()=>onSave(modalRoot.querySelector('.modal'))}
function closeModal(){modalRoot.innerHTML=''}function toast(msg){toast.textContent=msg;toast.classList.remove('hidden');setTimeout(()=>toast.classList.add('hidden'),3000)}
init();
</script>
</body>
</html>
